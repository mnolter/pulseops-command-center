services:
  postgres:
    image: postgres:16-alpine
    container_name: pulseops-postgres
    environment:
      POSTGRES_USER: pulseops
      POSTGRES_PASSWORD: pulseops
      POSTGRES_DB: pulseops
    ports:
      - "5432:5432"
    volumes:
      - pulseops_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulseops -d pulseops"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: pulseops-redis
    ports:
      - "6379:6379"
    volumes:
      - pulseops_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pulseops_postgres:
  pulseops_redis:
